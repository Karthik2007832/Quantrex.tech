<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Chrome Gradient -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#E2E8F0"/>
      <stop offset="70%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <!-- Blue Glow Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="50%" stop-color="#0B5ED7"/>
      <stop offset="100%" stop-color="#0A3D91"/>
    </linearGradient>
    <!-- Circuit Glow Drop Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer ring: Stylized Q body -->
  <circle cx="50" cy="45" r="30" stroke="url(#chromeGrad)" stroke-width="6" stroke-linecap="round" stroke-dasharray="140 40" />
  <!-- Circuit traces inside the ring -->
  <path d="M 50 15 L 50 25 M 20 45 L 30 45 M 80 45 L 70 45 M 50 75 L 50 65" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round" />
  <!-- Circuit vias -->
  <circle cx="50" cy="25" r="2" fill="#00F2FE" />
  <circle cx="30" cy="45" r="2" fill="#00F2FE" />
  <circle cx="70" cy="45" r="2" fill="#00F2FE" />
  <circle cx="50" cy="65" r="2" fill="#00F2FE" />
  <!-- Inner Microchip -->
  <rect x="38" y="33" width="24" height="24" rx="4" fill="url(#chromeGrad)" stroke="url(#blueGrad)" stroke-width="2" filter="url(#glow)" />
  <!-- Chip Pins -->
  <path d="M 34 38 H 38 M 34 45 H 38 M 34 52 H 38 M 62 38 H 66 M 62 45 H 66 M 62 52 H 66 M 43 29 V 33 M 50 29 V 33 M 57 29 V 33 M 43 57 V 61 M 50 57 V 61 M 57 57 V 61" stroke="url(#chromeGrad)" stroke-width="1.5" />
  <!-- Chip core connection lines -->
  <path d="M 43 45 H 57 M 50 38 V 52" stroke="#00F2FE" stroke-width="1" />
  <!-- Q Tail: Sleek metallic connector with a blue terminal via -->
  <path d="M 70 65 L 85 80" stroke="url(#chromeGrad)" stroke-width="6" stroke-linecap="round" />
  <path d="M 72 63 L 83 74" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round" />
  <circle cx="85" cy="80" r="3.5" fill="#00F2FE" filter="url(#glow)" />
  <circle cx="85" cy="80" r="1.5" fill="#FFFFFF" />
</svg>
